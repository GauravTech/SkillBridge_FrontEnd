<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Skill-Bridge</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div id="status-msg" style="display: none; padding: 10px; border-radius: 8px; margin-bottom: 20px;"></div>
            <div id="step-1">
                <div class="auth-header">
                    <h2>Forgot Password</h2>
                    <p>We'll send a 6-digit code to your email</p>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
                <button onclick="sendOTP()" class="auth-btn" id="send-btn">Send OTP Code</button>
            </div>

            <div id="step-2" class="hidden">
                <div class="auth-header">
                    <h2>Verify OTP</h2>
                    <p>Enter the code sent to your email</p>
                </div>
                <div class="input-group">
                    <label>6-Digit OTP</label>
                    <input type="text" id="otp" maxlength="6" style="text-align: center; font-size: 1.2rem; letter-spacing: 4px;">
                </div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="At least 6 characters">
                </div>
                <button onclick="resetPassword()" class="auth-btn">Reset Password</button>
            </div>
            
            <div class="auth-footer" style="margin-top: 20px; text-align: center;">
                <a href="login.html" style="text-decoration: none; color: #6c5ce7;">Return to Login</a>
            </div>
        </div>
    </div>

    <script>

        function showStatus(text, isError = false) {
    const msgBox = document.getElementById('status-msg');
    msgBox.innerText = text;
    msgBox.style.display = 'block';
    
    // Style based on success or error
    msgBox.style.backgroundColor = isError ? '#ffeef0' : '#e6fffa';
    msgBox.style.color = isError ? '#d63031' : '#2ecc71';
    msgBox.style.border = `1px solid ${isError ? '#ffccd1' : '#b2f5ea'}`;

    // Hide after 5 seconds
    setTimeout(() => {
        msgBox.style.display = 'none';
    }, 5000);
}
        async function sendOTP() {
    const email = document.getElementById('email').value;
    const btn = document.getElementById('send-btn');
    if(!email) return showStatus("Please enter your email", true);
    
    btn.disabled = true;
    btn.innerText = "Sending...";

    try {
        const res = await fetch(`http://localhost:3000/api/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        
        if(res.ok) {
            showStatus("OTP sent! Please check your inbox.");
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        } else {
            showStatus(data.message, true);
        }
    } catch (err) { 
        showStatus("Connection error", true); 
    }
    btn.disabled = false;
    btn.innerText = "Send OTP";
}
        async function resetPassword() {
    const email = document.getElementById('email').value;
    const otp = document.getElementById('otp').value;
    const newPassword = document.getElementById('new-password').value;

    if(!otp || !newPassword) {
        return showStatus("Please enter OTP and new password", true);
    }

    try {
        const res = await fetch(`http://localhost:3000/api/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                email, 
                otp: otp.toString(),   // 🔥 ensure string
                newPassword 
            })
        });

        const data = await res.json();

        if(res.ok) {
            showStatus("Password updated! Redirecting...");
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            showStatus(data.message, true);
        }
    } catch (err) { 
        showStatus("Reset failed", true); 
    }
}
    </script>
</body>
</html>
