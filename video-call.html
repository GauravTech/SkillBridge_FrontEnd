<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Call - Skill-Bridge</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/video-call.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto&display=swap" rel="stylesheet" />
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  <!-- <script>
    if (!localStorage.getItem('loggedInStudent') && !localStorage.getItem('loggedInMentor')) {
      window.location.href = "login.html";
    }
  </script> -->
</head>
<body>

<header class="navbar">
        <div class="container">
            <div class="logo">
                <img src="assets/images/SB_logo.png" alt="Skill-Bridge Logo" class="logo-img">
                Skill Bridge
            </div>
            <nav>
               <nav>
            <ul class="nav-links">
              <li><a href="#" id="home-link">Home</a></li>
              <li><a href="chat.html" >Chats</a></li>
              <li><a href="video-call.html" class="active">Video Call</a></li>
            </ul>
          </nav>
            </nav>
        </div>
    </header>

<div class="video-call-container">
  <div class="video-area">
    <div class="video-frame remote-video">
      <video autoplay playsinline></video>
       <div class="video-label" id="remote-user-label">Remote User</div>
    </div>
    <div class="video-frame local-video">
      <video autoplay playsinline muted></video>
    <div class="video-label" id="local-user-label">You</div>
    </div>

    <div class="call-controls">
  <button id="start-call" class="control-btn start" aria-label="Start Call"><i class="fas fa-phone"></i></button>
  <button id="end-call" class="control-btn end" aria-label="End Call"><i class="fas fa-phone-slash"></i></button>
  <button id="mute-audio" class="control-btn" aria-label="Toggle Mute"><i class="fas fa-microphone-slash"></i></button>
  <button id="toggle-video" class="control-btn" aria-label="Toggle Video"><i class="fas fa-video-slash"></i></button>
  <button id="toggle-chat" class="control-btn" aria-label="Toggle Chat">
    <i class="fas fa-comment"></i>
  </button>
  <span id="timer">00:00</span>
  <button id="screen-share" class="control-btn" aria-label="Share Screen"><i class="fas fa-desktop"></i></button>
</div>

  </div>

 <div class="side-chat">
  <h3>Chat</h3>
 </br>
  <div id="side-chat-messages" class="chat-messages"></div>
  <form id="side-chat-form" class="chat-input">
  <button type="button" id="file-btn" title="Send File" style="margin-right: 5px;"><i class="fas fa-paperclip"></i></button>
  
  <input type="file" id="side-file-input" style="display:none;" />
  <input id="side-message-input" type="text" placeholder="Type a message..." autocomplete="off" />
  <button type="submit">Send</button>
</form>
</div>
</div>

<!-- Image Preview Modal -->
<div id="image-modal" class="image-modal hidden">
  <img id="modal-image" src="" alt="Full preview">
</div>

<!-- Student Review Modal -->
<div id="video-review-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content review-modal-content">
    <h2>Rate your Session</h2>
    <p>Please share your feedback about this session with your mentor.</p>
    
    <form id="video-review-form">
      <!-- Star Rating -->
      <div class="rating-stars-container">
        <span class="star-rating-label">Rating:</span>
        <div class="star-rating" id="star-rating-input" role="radiogroup" aria-label="Session rating">
          <button type="button" class="star-btn" data-value="1" role="radio" aria-checked="false" aria-label="1 star">&#9734;</button>
          <button type="button" class="star-btn" data-value="2" role="radio" aria-checked="false" aria-label="2 stars">&#9734;</button>
          <button type="button" class="star-btn" data-value="3" role="radio" aria-checked="false" aria-label="3 stars">&#9734;</button>
          <button type="button" class="star-btn" data-value="4" role="radio" aria-checked="false" aria-label="4 stars">&#9734;</button>
          <button type="button" class="star-btn" data-value="5" role="radio" aria-checked="false" aria-label="5 stars">&#9734;</button>
        </div>
      </div>
      
      <!-- Review Textarea -->
      <div class="form-group">
        <label for="review-textarea">Write a Review:</label>
        <textarea id="review-textarea" placeholder="Describe your experience with the mentor..." rows="5" required></textarea>
        <div class="word-counter-container">
          <span id="review-word-counter">Words: 0/200</span>
        </div>
      </div>
      
      <!-- Success/Error Message Container -->
      <div id="review-message" class="review-message-box" style="display: none;"></div>
      
      <!-- Buttons -->
      <div class="modal-actions">
        <button type="button" id="cancel-review-btn" class="btn secondary">Cancel</button>
        <button type="submit" id="submit-review-btn" class="btn primary" disabled>Submit Review</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
<script src="js/call-listener.js"></script>
<script src="js/video-call.js"></script>
</body>
</html>
